<body>
    RyDoom adalah sosok yang berdiri di puncak kekuatan, makhluk yang telah melampaui batas-batas ruang, waktu, dan hukum alam. Tidak ada kerajaan yang mampu mengusiknya, tidak ada dewa yang sanggup menahannya, dan tidak ada peperangan yang benar-benar mampu memberinya tantangan. Kemenangan demi kemenangan akhirnya kehilangan makna, hingga yang tersisa hanyalah kehampaan dan rasa bosan yang tak berujung.Didorong oleh hasrat untuk menemukan sesuatu yang dapat membangkitkan semangatnya kembali, RyDoom memulai perjalanan tanpa akhir melintasi bintang-bintang. Ia menjelajahi galaksi demi galaksi, menembus dimensi, dan mengarungi berbagai alam semesta demi mencari sosok yang cukup kuat untuk membuatnya mengerahkan seluruh kemampuannya. Namun, setiap dunia yang ia datangi berakhir dengan hasil yang sama: para penguasa runtuh, para pahlawan tumbang, dan peradaban menyerah di hadapan kekuatannya. Seiring berjalannya waktu, pencarian RyDoom berubah menjadi penaklukan. Bukan karena haus kekuasaan atau ambisi untuk memerintah, melainkan karena setiap kemenangan hanyalah langkah berikutnya menuju harapan menemukan lawan yang lebih kuat. Setiap galaksi yang ditaklukkan menjadi panggung baru, setiap alam semesta yang berhasil dikuasai menjadi undangan bagi siapa pun yang cukup berani untuk menantangnya.Bagi sebagian makhluk, RyDoom adalah simbol kehancuran. Bagi yang lain, ia adalah ujian terakhir yang menentukan nasib dunia mereka. Namun bagi RyDoom sendiri, semua itu hanyalah bagian dari pencarian yang tak kunjung berakhir—mencari satu pertarungan yang mampu mengusir kebosanan yang telah menguasai dirinya selama eon. Hingga hari itu tiba, ia akan terus melangkah, meninggalkan jejak penaklukan di setiap sudut kosmos, sambil menunggu munculnya seseorang yang benar-benar layak disebut sebagai lawannya.
